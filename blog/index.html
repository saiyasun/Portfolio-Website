<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="Asiah's Notes">
    <meta property="og:description" content="Thinking through language, learning, tech, and life.">
    <meta property="og:image" content="https://asiahcrutchfield.com/images/meta/og_image/og_image.png">
    <meta property="og:url" content="https://asiahcrutchfield.com/blog/index.html">
    <meta property="og:type" content="website">

    <title>Blog | Asiah Crutchfield</title>

    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/components/components.css">
    <link rel="stylesheet" href="/blog/blog.css">

    <link rel="canonical" href="https://asiahcrutchfield.com/blog/index.html">

    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "Blog",
            "name": "Asiah Crutchfield Blog",
            "url": "https://asiahcrutchfield.com/blog/index.html",
            "description": "Thoughts on language learning, technology, and personal 
            development.",
            "author": {
                "@type": "Person",
                "name": "Asiah Crutchfield",
                "alternateName": "孫賽亞",
                "url": "https://asiahcrutchfield.com/"
            }
        }
    </script>


    <script src="/components/navbar/navbar.js" defer></script>
    <script src="/components/translator/translator.js" defer></script>
    <script src="/blog/scripts/select.js" defer></script>
    <script src="/universal.js" defer></script>
</head>
<body>
    <!--SITE NAV BAR-->
    <site-navbar></site-navbar>

    <main id="blog_homepage">
        <!--Blog title and intro-->
        <div id="blog_intro">
            <h1 id="blog_homepage-title" class="blog_homepage-header" data-i18n="blog_homepage.title">
                Asiah's Notes
            </h1>
            <h4 id="blog_homepage-subtitle" class="blog_homepage-header" data-i18n="blog_homepage.subtitle">
                thinking through language, learning, tech, and life
            </h4>
        </div>
        <!--article categories-->
        <ul id="blog_homepage-tags" class="hidden">
            <!--append tags here-->
        </ul>
            <template class="main-tag-template">
                <li class="blog-tag main-tag"></li>
            </template>
        
        <template id="blog-template">
            <a class="blog_item">
                <div class="blog_item-intro_container">
                    <div class="blog_item-img_container">
                        <img class="blog_item-img">
                        <h4 class="blog_item-title" data-i18n="blog_item.title">Title</h4>
                    </div>
                    <div class="blog_item-date">
                        <span class="blog_item-month" data-i18n="blog_item.month"></span><span class="blog_item-day"></span><span class="blog_item-year"></span>
                    </div>
                </div>
                <p class="blog_item-description" data-i18n="blog_item.description"></p>
                <ul class="blog_item-tag_container">
                </ul>
            </a>
        </template>

        <!--blog selection container-->
        <div id="blog_selection">
            <!--append here-->
        </div>
    </main>

    <div id="coming-soon" class="hidden">
        <p data-i18n="coming-soon">
            Posts coming soon.
        </p>
        <a href="/index.html">← back</a>
    </div>

    <!--TRANSLATION-->
    <site-translator></site-translator>
</body>
</html>
