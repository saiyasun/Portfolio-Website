<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>

    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/blog/post.css">

    <script src="/blog/blog.js"></script>
</head>
<body>
    <!--SITE NAV BAR-->
    <nav id="main-nav" class="glass-nav" aria-label="Primary navigation">
        <ul>
            <li><a class="nav_active" href="#" data-i18n="nav.home">HOME</a></li>
            <li><a href="/index.html#about" data-i18n="nav.about">ABOUT</a></li>
            <li><a href="/index.html#experience" data-i18n="nav.exp">EXPERIENCE</a></li>
            <li><a href="/index.html#skills" data-i18n="nav.skills">SKILLS</a></li>
            <li><a href="/index.html#projects" data-i18n="nav.projects">PROJECTS</a></li>
            <li><a href="/blog/index.html" data-i18n="nav.blog">BLOG</a></li>
            <li><a href="/index.html#contact" data-i18n="nav.contact">CONTACT</a></li>
            <hr id="main-nav_hr">
            <li><a href="/docs/Asiah Crutchfield - Resume.pdf" data-static><img class="icon" src="images/icons/resume-blk.svg" alt="resume"></a></li>
        </ul>
    </nav>
        <!--~mobile nav bar~-->
        <nav id="mobile-nav" class="glass-nav" aria-label="Mobile navigation">
            <ul class="nav-rail">
                <li><a href="/index.html#about" data-i18n="nav.about">ABOUT</a></li>
                <li><a href="/index.html#experience" data-i18n="nav.exp">EXPERIENCE</a></li>
                <li><a href="/index.html#skills" data-i18n="nav.skills">SKILLS</a></li>
                <li><a href="/index.html#projects" data-i18n="nav.projects">PROJECTS</a></li>
                <li><a href="/blog/index.html" data-i18n="nav.blog">BLOG</a></li>
                <li><a href="/index.html#contact" data-i18n="nav.contact">CONTACT</a></li>
            </ul>
        </nav>
    <main id="post-container">
        <div class="blog_post">
            <div class="blog_post-intro">
                <img class="blog_post-img">
                <div class="blog_post-title_container">
                    <h2 class="blog_post-title"></h2>
                    <div class="blog_item-date">
                        <span class="blog_item-month" data-i18n="blog_item.month"></span>
                        <span class="blog_item-day"></span>
                        <span class="blog_item-year"></span>
                    </div>
                    <div class="blog_post-reading_time">
                        <span class="reading_time-text" data-i18n="reading_time.text"></span>:
                        <span class="reading_time-time"></span>
                        <span class="reading_time-marker" data-i18n="reading_time.marker"></span>
                    </div>
                </div>
            </div>

            <div class="blog_post-article">
                <div class="blog_post-post">
                    <div class="post_edit">
                        <span class="post_edit-text" data-i18n="post_edit.text"></span>
                        <div class="blog_item-date">
                            <span class="blog_item-month" data-i18n="blog_item.month"></span><span class="blog_item-day"></span><span class="blog_item-year"></span>
                        </div>
                    </div>
                </div>
                <div class="blog_post-end">
                    <div class="previous-article article-ender article-suggestion">
                        <span class="previous-arrow article-arrow"></span>
                        <h5 class="blog_post-end_title"></h5>
                    </div>
                    <div class="random-article article-ender article-suggestion"></div>
                    <div class="next-article article-ender article-suggestion">
                        <span class="next-arrow article-arrow"></span>
                        <h5 class="blog_post-end_title"></h5>
                    </div>
                </div>
            </div>
        </div>

        <div id="more_articles-container">
            <h4 id="more_articles-title"></h4>
            <ul id="related-articles">
                <li><!--append here--></li>
            </ul>
            <div class="related_article">
                <h5 class="related_article-title"></h5>
                <div class="related_article-date">
                    <div class="blog_item-date">
                        <span class="blog_item-month"></span><span class="blog_item-day"></span><span class="blog_item-year"></span>
                    </div>
                    <div class="blog-day_tracker">
                        <span class="day-counter"></span><span class="day-marker"data-i18n="day.marker"></span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!--TRANSLATION-->
    <div id="translator">
        <button class="lang-btn is_hidden glass-nav" id="lang_btn-en" data-lang="en">EN</button>
        <button class="lang-btn glass-nav" id="lang_btn-zh" data-lang="zh">中</button>
    </div>
</body>
</html>
